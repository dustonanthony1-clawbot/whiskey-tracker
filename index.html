<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#08080a">
  <meta name="description" content="Track your whiskey collection with style">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Whiskey Tracker</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%2308080a' width='100' height='100' rx='20'/><text x='50' y='68' font-size='50' text-anchor='middle' fill='%23d4a84b'>W</text></svg>">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="app">
    <header>
      <div class="hero">
        <div class="logo-graphics">
          <!-- Blanton's-style bourbon bottle SVG -->
          <svg class="bottle-svg" viewBox="0 0 52 110" fill="none" xmlns="http://www.w3.org/2000/svg">
            <defs>
              <linearGradient id="bottleGold" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" style="stop-color:#d4a84b"/>
                <stop offset="40%" style="stop-color:#f0d78c"/>
                <stop offset="60%" style="stop-color:#d4a84b"/>
                <stop offset="100%" style="stop-color:#b8922e"/>
              </linearGradient>
              <linearGradient id="bottleDark" x1="0%" y1="0%" x2="100%" y2="0%">
                <stop offset="0%" style="stop-color:#0f0d0a"/>
                <stop offset="50%" style="stop-color:#1a1612"/>
                <stop offset="100%" style="stop-color:#0f0d0a"/>
              </linearGradient>
              <linearGradient id="labelBg" x1="0%" y1="0%" x2="0%" y2="100%">
                <stop offset="0%" style="stop-color:#f5f5f5"/>
                <stop offset="100%" style="stop-color:#e8e8e8"/>
              </linearGradient>
              <linearGradient id="foilWrap" x1="0%" y1="0%" x2="100%" y2="0%">
                <stop offset="0%" style="stop-color:#c9a035"/>
                <stop offset="50%" style="stop-color:#f0d78c"/>
                <stop offset="100%" style="stop-color:#c9a035"/>
              </linearGradient>
            </defs>
            <!-- Foil cap at top -->
            <ellipse cx="26" cy="8" rx="12" ry="4" fill="url(#foilWrap)"/>
            <rect x="14" y="4" width="24" height="6" fill="url(#foilWrap)"/>
            <!-- Bottle neck -->
            <path d="M18 10 L18 26 L14 30 L14 32 L38 32 L38 30 L34 26 L34 10 Z" fill="url(#bottleDark)" stroke="url(#bottleGold)" stroke-width="1"/>
            <!-- Foil neck wrap -->
            <rect x="15" y="14" width="22" height="8" fill="url(#foilWrap)" opacity="0.7"/>
            <!-- Bottle shoulder/sides -->
            <path d="M14 32 L14 100 Q14 104 18 104 L34 104 Q38 104 38 100 L38 32" fill="url(#bottleDark)" stroke="url(#bottleGold)" stroke-width="1"/>
            <!-- Gold foil on sides -->
            <rect x="14" y="32" width="3" height="68" fill="url(#foilWrap)" opacity="0.6"/>
            <rect x="35" y="32" width="3" height="68" fill="url(#foilWrap)" opacity="0.6"/>
            <!-- White/cream label -->
            <rect x="17" y="38" width="18" height="42" rx="1" fill="url(#labelBg)"/>
            <!-- Gold border on label -->
            <rect x="17" y="38" width="18" height="42" rx="1" fill="none" stroke="url(#bottleGold)" stroke-width="0.75"/>
            <!-- ALC label text -->
            <text x="26" y="47" font-family="Georgia, serif" font-size="4" fill="#1a1a1a" text-anchor="middle" font-weight="bold">ALC.</text>
            <text x="26" y="52" font-family="Georgia, serif" font-size="4" fill="#1a1a1a" text-anchor="middle">46.5%</text>
            <!-- Blanton's text -->
            <text x="26" y="60" font-family="Georgia, serif" font-size="5" fill="#1a1a1a" text-anchor="middle" font-weight="bold">BLANTON'S</text>
            <!-- Single Barrel text -->
            <text x="26" y="67" font-family="Georgia, serif" font-size="3.5" fill="#1a1a1a" text-anchor="middle">SINGLE BARREL</text>
            <!-- Triangle symbol -->
            <polygon points="26,70 23,74 29,74" fill="none" stroke="#1a1a1a" stroke-width="0.5"/>
            <!-- Horse emblem (simplified knight) -->
            <ellipse cx="26" cy="78" rx="4" ry="2.5" fill="none" stroke="url(#bottleGold)" stroke-width="0.5"/>
            <!-- Bottled by text -->
            <text x="26" y="83" font-family="Georgia, serif" font-size="2.5" fill="#666" text-anchor="middle">Bottled by</text>
            <!-- Bourbon text -->
            <text x="26" y="87" font-family="Georgia, serif" font-size="2.5" fill="#666" text-anchor="middle">KENTUCKY BOURBON</text>
          </svg>
          <!-- Glencairn glass SVG (half full) -->
          <svg class="glass-svg" viewBox="0 0 44 60" fill="none" xmlns="http://www.w3.org/2000/svg">
            <defs>
              <linearGradient id="whiskeyFill" x1="0%" y1="0%" x2="0%" y2="100%">
                <stop offset="0%" style="stop-color:#d4a84b;stop-opacity:0.9"/>
                <stop offset="100%" style="stop-color:#8b6914;stop-opacity:0.95"/>
              </linearGradient>
              <linearGradient id="glassBody" x1="0%" y1="0%" x2="100%" y2="0%">
                <stop offset="0%" style="stop-color:rgba(255,255,255,0.12)"/>
                <stop offset="50%" style="stop-color:rgba(255,255,255,0.05)"/>
                <stop offset="100%" style="stop-color:rgba(255,255,255,0.12)"/>
              </linearGradient>
            </defs>
            <!-- Glass bowl - wider at top, narrower at bottom (Glencairn shape) -->
            <path d="M4 10 Q4 4 10 2 L34 2 Q40 4 40 10 L36 38 Q36 46 28 48 L16 48 Q8 46 8 38 Z" fill="url(#glassBody)" stroke="rgba(255,255,255,0.25)" stroke-width="1"/>
            <!-- Whiskey (half full - amber liquid) -->
            <path d="M7 32 Q7 30 9 29 L35 29 Q37 30 37 32 L34 38 Q34 43 28 44 L16 44 Q10 43 10 38 Z" fill="url(#whiskeyFill)" opacity="0.88"/>
            <!-- Liquid surface shine -->
            <ellipse cx="22" cy="30" rx="12" ry="2" fill="rgba(255,255,255,0.1)"/>
            <!-- Glass base plate -->
            <ellipse cx="22" cy="50" rx="12" ry="3" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>
            <!-- Stem -->
            <rect x="19" y="48" width="6" height="6" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.15)" stroke-width="0.5"/>
            <!-- Shine reflection on glass -->
            <path d="M8 12 Q9 20 8 28" stroke="rgba(255,255,255,0.2)" stroke-width="1.5" fill="none" stroke-linecap="round"/>
            <!-- Small highlight -->
            <circle cx="12" cy="14" r="1.5" fill="rgba(255,255,255,0.15)"/>
          </svg>
        </div>
        <div class="hero-text">
          <h1>Whiskey <span>Tracker</span></h1>
          <p>Curate your collection</p>
        </div>
      </div>
      <div class="controls">
        <div class="top-bar">
          <div class="stats-preview">
            <div class="stat-item">
              <div class="stat-value" id="totalCount">0</div>
              <div class="stat-label">Bottles</div>
            </div>
            <div class="stat-item">
              <div class="stat-value" id="totalValue">$0</div>
              <div class="stat-label">Collection</div>
            </div>
          </div>
          <div class="header-actions">
            <button id="statsBtn" class="icon-btn" title="Stats">📊</button>
            <button id="addBtn" class="icon-btn" title="Add Whiskey">➕</button>
          </div>
        </div>
        <div class="search-bar">
          <input type="text" id="searchInput" placeholder="Search your collection...">
          <select id="filterType">
            <option value="">All Types</option>
            <option value="Bourbon">Bourbon</option>
            <option value="Scotch">Scotch</option>
            <option value="Rye">Rye</option>
            <option value="Irish">Irish</option>
            <option value="Japanese">Japanese</option>
            <option value="Canadian">Canadian</option>
            <option value="Other">Other</option>
          </select>
        </div>
      </div>
    </header>

    <div id="collection" class="collection"></div>
    <div id="emptyState" class="empty-state">
      <div class="icon">🥃</div>
      <h2>Begin Your Collection</h2>
      <p>Start tracking your whiskey journey. Add bottles, capture tasting notes, and build your personal vault.</p>
      <button class="cta" onclick="openModal()">
        <span>Add First Bottle</span>
        <span>➕</span>
      </button>
    </div>
  </div>

  <!-- Add/Edit Modal -->
  <div id="modal" class="modal hidden">
    <div class="modal-content">
      <div class="modal-header">
        <h2 id="modalTitle">Add Whiskey</h2>
        <button id="closeModal" class="close-btn">✕</button>
      </div>
      <form id="whiskeyForm">
        <div class="form-group">
          <label for="name">Name *</label>
          <input type="text" id="name" required placeholder="e.g., Blanton's Original Single Barrel">
        </div>
        <div class="form-group">
          <label for="distillery">Distillery</label>
          <input type="text" id="distillery" placeholder="e.g., Buffalo Trace">
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="type">Type *</label>
            <select id="type" required>
              <option value="Bourbon">Bourbon</option>
              <option value="Scotch">Scotch</option>
              <option value="Rye">Rye</option>
              <option value="Irish">Irish</option>
              <option value="Japanese">Japanese</option>
              <option value="Canadian">Canadian</option>
              <option value="Other">Other</option>
            </select>
          </div>
          <div class="form-group">
            <label for="age">Age (years)</label>
            <input type="number" id="age" min="0" placeholder="e.g., 12">
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="abv">ABV %</label>
            <input type="number" id="abv" min="0" max="100" step="0.1" placeholder="e.g., 46.5">
          </div>
          <div class="form-group">
            <label for="proof">Proof</label>
            <input type="number" id="proof" min="0" placeholder="e.g., 93">
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="price">Price ($)</label>
            <input type="number" id="price" min="0" step="0.01" placeholder="e.g., 65.00">
          </div>
          <div class="form-group">
            <label for="datePurchased">Date Purchased</label>
            <input type="date" id="datePurchased">
          </div>
        </div>
        <div class="form-group">
          <label for="photo">Photo</label>
          <input type="file" id="photo" accept="image/*" capture="environment">
          <img id="photoPreview" class="photo-preview" alt="Preview">
        </div>
        <div class="form-group">
          <label for="notes">Tasting Notes</label>
          <textarea id="notes" rows="3" placeholder="Describe the flavors you experience..."></textarea>
        </div>
        <div class="form-group">
          <label>Rating</label>
          <div class="rating-input">
            <span class="star" data-rating="1">★</span>
            <span class="star" data-rating="2">★</span>
            <span class="star" data-rating="3">★</span>
            <span class="star" data-rating="4">★</span>
            <span class="star" data-rating="5">★</span>
          </div>
          <input type="hidden" id="rating" value="0">
        </div>
        <div class="form-group">
          <label for="flavorTags">Flavor Tags</label>
          <input type="text" id="flavorTags" placeholder="e.g., vanilla, oak, cherry (comma separated)">
        </div>
        <button type="submit" id="submitBtn" class="submit-btn">Add Whiskey</button>
      </form>
    </div>
  </div>

  <!-- Stats Modal -->
  <div id="statsModal" class="modal hidden">
    <div class="modal-content">
      <div class="modal-header">
        <h2>📊 Collection Stats</h2>
        <button id="closeStats" class="close-btn">✕</button>
      </div>
      <div id="statsContent" class="stats-content"></div>
    </div>
  </div>

  <!-- Detail Modal -->
  <div id="detailModal" class="modal hidden">
    <div class="modal-content">
      <div class="modal-header">
        <h2 id="detailTitle">Whiskey Details</h2>
        <button id="closeDetail" class="close-btn">✕</button>
      </div>
      <div id="detailContent" class="detail-content"></div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
