<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800">
  <defs>
    <!-- Gold gradient -->
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d4a84b"/>
      <stop offset="50%" style="stop-color:#e8c06a"/>
      <stop offset="100%" style="stop-color:#c9962f"/>
    </linearGradient>
    <!-- Dark background gradient -->
    <linearGradient id="darkBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a1f"/>
      <stop offset="100%" style="stop-color:#08080a"/>
    </linearGradient>
    <!-- Wood texture pattern -->
    <pattern id="woodGrain" width="4" height="40" patternUnits="userSpaceOnUse">
      <rect fill="#3d2817" width="4" height="40"/>
      <rect fill="#2a1a0f" width="1" height="40"/>
      <rect fill="#4a3020" x="2" width="1" height="40"/>
    </pattern>
  </defs>
  
  <!-- Background -->
  <rect fill="url(#darkBg)" width="800" height="800" rx="40"/>
  
  <!-- Barrel body - curved sides -->
  <ellipse cx="400" cy="400" rx="320" ry="320" fill="#3d2817"/>
  <ellipse cx="400" cy="400" rx="280" ry="280" fill="#2a1a0f"/>
  
  <!-- Barrel face - lighter wood -->
  <ellipse cx="400" cy="400" rx="220" ry="220" fill="#8b6914"/>
  <ellipse cx="400" cy="400" rx="200" ry="200" fill="#a07830"/>
  
  <!-- Wood grain lines on barrel face -->
  <g stroke="#6b5010" stroke-width="2" opacity="0.4">
    <line x1="250" y1="320" x2="550" y2="320"/>
    <line x1="230" y1="360" x2="570" y2="360"/>
    <line x1="220" y1="400" x2="580" y2="400"/>
    <line x1="230" y1="440" x2="570" y2="440"/>
    <line x1="250" y1="480" x2="550" y2="480"/>
  </g>
  
  <!-- Metal hoops -->
  <ellipse cx="400" cy="200" rx="290" ry="40" fill="none" stroke="url(#gold)" stroke-width="20"/>
  <ellipse cx="400" cy="600" rx="290" ry="40" fill="none" stroke="url(#gold)" stroke-width="20"/>
  
  <!-- Top hoop -->
  <ellipse cx="400" cy="140" rx="240" ry="30" fill="none" stroke="url(#gold)" stroke-width="12"/>
  
  <!-- Tap/spigot -->
  <rect x="385" y="520" width="30" height="60" fill="#3d2817"/>
  <rect x="375" y="510" width="50" height="20" rx="5" fill="#3d2817"/>
  <rect x="380" y="580" width="40" height="15" rx="3" fill="#888"/>
  
  <!-- Tap handle -->
  <rect x="395" y="490" width="10" height="25" fill="#666"/>
  <ellipse cx="400" cy="485" rx="20" ry="10" fill="#555"/>
  
  <!-- Bung/plug at top -->
  <ellipse cx="480" cy="200" rx="15" ry="10" fill="#5a3d20"/>
  
  <!-- "Barrel Proof" text on barrel face -->
  <text x="400" y="380" font-family="Georgia, 'Times New Roman', serif" font-size="52" font-weight="bold" fill="url(#gold)" text-anchor="middle" letter-spacing="3">
    Barrel
  </text>
  <text x="400" y="440" font-family="Georgia, 'Times New Roman', serif" font-size="52" font-weight="bold" fill="url(#gold)" text-anchor="middle" letter-spacing="3">
    Proof
  </text>
  
  <!-- Subtle highlight on top of barrel -->
  <ellipse cx="350" cy="180" rx="100" ry="30" fill="#fff" opacity="0.08"/>
</svg>