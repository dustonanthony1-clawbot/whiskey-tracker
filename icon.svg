<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d4a84b"/>
      <stop offset="50%" style="stop-color:#e8c06a"/>
      <stop offset="100%" style="stop-color:#d4a84b"/>
    </linearGradient>
    <linearGradient id="darkBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a1f"/>
      <stop offset="100%" style="stop-color:#08080a"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect fill="url(#darkBg)" width="512" height="512" rx="96"/>
  
  <!-- Outer ring / barrel shape -->
  <circle cx="256" cy="256" r="200" fill="none" stroke="url(#gold)" stroke-width="16"/>
  
  <!-- Inner barrel staves pattern -->
  <ellipse cx="256" cy="256" rx="140" ry="140" fill="none" stroke="url(#gold)" stroke-width="8"/>
  
  <!-- Barrel bands -->
  <rect x="116" y="180" width="280" height="16" rx="8" fill="url(#gold)"/>
  <rect x="116" y="316" width="280" height="16" rx="8" fill="url(#gold)"/>
  
  <!-- Letter B -->
  <text x="256" y="290" font-family="Georgia, serif" font-size="180" font-weight="bold" fill="url(#gold)" text-anchor="middle">B</text>
  
  <!-- Letter P -->
  <text x="256" y="430" font-family="Georgia, serif" font-size="180" font-weight="bold" fill="url(#gold)" text-anchor="middle">P</text>
</svg>